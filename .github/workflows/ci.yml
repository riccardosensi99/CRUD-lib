name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify public exports
        run: npm run smoke:exports

      - name: Verify auth hardening
        run: npm run smoke:auth-hardening

      - name: Verify auth service
        run: npm run smoke:auth-service

      - name: Verify package contents
        run: npm pack --dry-run
